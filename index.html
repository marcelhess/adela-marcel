<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date - 31. März 2027</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset und Grundeinstellungen */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #770078;
            color: #F8F8F8;
            font-family: 'Pinyon Script', cursive, sans-serif;
            display: grid; /* Grid Layout zum Zentrieren */
            place-items: center; /* Horizontale und vertikale Zentrierung */
            overflow: hidden; /* Verhindert Scrollbalken */
            text-align: center;
        }

        /* Container der beide Texte umschliesst */
        .container {
            display: grid;
            place-items: center;
            width: 90%;
            max-width: 1400px;
            padding: 20px;
        }

        /* Gemeinsame Eigenschaften fuer die Textbloecke */
        .text-block {
            /* Textbloecke uebereinander legen */
            grid-area: 1 / 1; 
            opacity: 0;
            /* Gesamtdauer 20s: 10s fuer diesen Block, 10s Pause */
            animation: fadeLoop 20s infinite ease-in-out;
            width: 100%;
        }

        /* Verzoegerungen aufteilen */
        .deutsch {
            animation-delay: 0s;
        }

        .tschechisch {
            animation-delay: 10s;
        }

        h1 {
            font-size: 56px;
            margin: 0 0 24px 0;
            line-height: 1.2;
            font-weight: normal; /* Kann je nach Schriftart-Schnitt angepasst werden */
        }

        h2 {
            font-size: 42px;
            margin: 0 0 16px 0;
            line-height: 1.3;
            font-weight: normal;
        }

        h3 {
            font-size: 32px;
            margin: 0;
            line-height: 1.3;
            font-weight: normal;
        }

        /* Animations-Keyframes 
           20s Gesamtzeit
           0 - 2s: Eindimmen (0% - 10%)
           2 - 8s: Voll sichtbar bleiben (10% - 40%)
           8 - 10s: Ausdimmen (40% - 50%)
           10 - 20s: Unsichtbar bleiben waehrend der andere Text gezeigt wird (50% - 100%)
        */
        @keyframes fadeLoop {
            0%   { opacity: 0; }
            10%  { opacity: 1; }
            40%  { opacity: 1; }
            50%  { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Responsive Design: Anpassung der Schriftgroesse auf kleineren Bildschirmen */
        @media (max-width: 1024px) {
            h1 {
                font-size: 48px;
            }
            h2 {
                font-size: 36px;
            }
            h3 {
                font-size: 28px;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }
            h2 {
                font-size: 28px;
            }
            h3 {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 28px;
            }
            h2 {
                font-size: 22px;
            }
            h3 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Deutscher Text -->
        <div class="text-block deutsch">
            <h1>Bitte Datum vormerken:</h1>
            <h2>Mittwoch, 31. März - Sonntag, 4. April 2027</h2>
            <h3>Weitere Informationen folgen zu gegebener Zeit</h3>
        </div>

        <!-- Tschechischer Text -->
        <div class="text-block tschechisch">
            <h1>Zapište si prosím do kalendáře:</h1>
            <h2>středa 31. března – neděle 4. dubna 2027</h2>
            <h3>Další informace budou následovat v pravý čas</h3>
        </div>
    </div>
</body>
</html>
